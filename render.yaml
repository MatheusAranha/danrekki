services:
  - type: web
    name: danrekki-api
    runtime: node
    plan: free
    region: virginia
    buildCommand: npx pnpm@9 install && ./node_modules/.bin/nx build api
    startCommand: node dist/apps/api/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
